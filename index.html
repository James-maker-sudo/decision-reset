                    return (<div key={sec.freq}><div style={{padding:"10px 16px 6px",display:"flex",gap:8,alignItems:"center"}}><span style={{fontSize:14}}>{sec.icon}</span><span style={{color:tmpl.color,fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:1}}>{sec.label}</span></div>{tasks.map((task,j)=>(<div key={j} style={{display:"flex",gap:10,padding:"7px 16px",borderTop:`1px solid ${T.faint}`}}><div style={{width:5,height:5,borderRadius:"50%",background:tmpl.color,flexShrink:0,marginTop:6}}/><span style={{color:T.muted,fontSize:13,flex:1}}>{task.label}</span><span style={{color:T.muted,fontSize:11,fontWeight:600}}>{task.time}</span></div>))}</div>);
                  })}
                  <div style={{padding:"12px 16px"}}>
                    <button onClick={()=>addTemplate(tmpl)} style={{width:"100%",background:added.has(tmpl.id)?`${T.green}12`:`${tmpl.color}15`,border:`1px solid ${added.has(tmpl.id)?T.green:tmpl.color}`,borderRadius:14,padding:"11px",color:added.has(tmpl.id)?T.green:tmpl.color,fontFamily:"'DM Sans',sans-serif",fontWeight:700,fontSize:14,cursor:"pointer"}}>
                      {added.has(tmpl.id)?"✓ Added — View Today":"＋ Add to My Routines"}
                    </button>
                  </div>
                </div>
              )}
            </div>
          ))}
        </div>
      )}

      {view==="builder" && (
        <div>
          {!isPro && (
            <Card glow={T.purple} style={{ background: `${T.purple}08`, marginBottom: 16 }}>
              <p style={{ color: T.purple, fontWeight: 700, fontSize: 12, marginBottom: 4 }}>⚡ Pro Feature</p>
              <p style={{ color: T.muted, fontSize: 12 }}>Full routine customization is available on the Pro plan. You can still build basic routines below.</p>
            </Card>
          )}
          <p style={{color:T.muted,fontSize:12,marginBottom:18}}>Create your own routine with custom tasks and times.</p>
          <div style={{display:"flex",gap:10,marginBottom:14}}>
            <select value={bEmoji} onChange={e=>setBEmoji(e.target.value)} style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:14,padding:"11px 8px",color:T.text,fontSize:20,cursor:"pointer",width:62,flexShrink:0}}>
              {["⭐","☀️","🌙","💪","🏠","💼","🧘","🎯","🌱","🔥","💫","🦋","📚","🏃","🍳"].map(e=><option key={e} value={e}>{e}</option>)}
            </select>
            <input value={bName} onChange={e=>setBName(e.target.value)} placeholder="Routine name…" style={{flex:1,background:T.card,border:`1px solid ${T.border}`,borderRadius:14,padding:"11px 16px",color:T.text,fontSize:14}}/>
          </div>
          <p style={{color:T.muted,fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>Color</p>
          <div style={{display:"flex",gap:8,marginBottom:18}}>
            {PALETTE.map(col=><button key={col} onClick={()=>setBColor(col)} style={{width:30,height:30,borderRadius:"50%",background:col,border:bColor===col?"3px solid #fff":"3px solid transparent",cursor:"pointer",flexShrink:0,outline:"none"}}/>)}
          </div>
          <p style={{color:T.muted,fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>Tasks</p>
          {bTasks.map((task,i)=>(
            <div key={task.id} style={{display:"flex",gap:8,marginBottom:8,alignItems:"center"}}>
              <input type="time" value={task.time} onChange={e=>setBTasks(ts=>ts.map(t=>t.id===task.id?{...t,time:e.target.value}:t))} style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:12,padding:"10px 8px",color:T.text,fontSize:12,width:90,flexShrink:0}}/>
              <input value={task.label} onChange={e=>setBTasks(ts=>ts.map(t=>t.id===task.id?{...t,label:e.target.value}:t))} placeholder={`Task ${i+1}`} style={{flex:1,background:T.card,border:`1px solid ${T.border}`,borderRadius:12,padding:"10px 12px",color:T.text,fontSize:13}}/>
              <button onClick={()=>setBTasks(ts=>ts.filter(t=>t.id!==task.id))} style={{background:`${T.coral}12`,border:`1px solid ${T.coral}25`,borderRadius:10,padding:"8px 10px",color:T.coral,fontSize:14,flexShrink:0}}>✕</button>
            </div>
          ))}
          <button onClick={()=>setBTasks(ts=>[...ts,{id:Date.now(),time:"09:00",label:""}])} style={{background:"rgba(255,255,255,0.03)",border:`1px dashed ${T.border}`,borderRadius:14,padding:"12px",color:T.muted,fontFamily:"'DM Sans',sans-serif",fontWeight:700,fontSize:13,cursor:"pointer",width:"100%",marginBottom:18}}>＋ Add Task</button>
          <button onClick={saveRoutine} disabled={!bName.trim()||bSaved} style={{width:"100%",background:bSaved?T.green:`linear-gradient(135deg,${bColor},${bColor}bb)`,border:"none",borderRadius:16,padding:"14px",color:"#fff",fontFamily:"'DM Sans',sans-serif",fontWeight:700,fontSize:15,cursor:"pointer",transition:"all 0.2s"}}>
            {bSaved?"✅ Saved!":"💾 Save My Routine"}
          </button>
        </div>
      )}
    </div>
  );
};

const WorkoutsTab = () => {
  const [active, setActive] = useState(null);
  const WS = [
    {emoji:"💪",title:"Full Body Burn",dur:"20 min",level:"Moderate",color:T.pink,steps:["10 squats","15 push-ups","20 lunges","30s plank","Rest 1 min","Repeat x3"]},
    {emoji:"🧘",title:"Stretch & Flow",dur:"15 min",level:"Easy",color:T.cyan,steps:["Neck rolls","Shoulder stretch","Hip flexor stretch","Hamstring stretch","Spinal twist","Child's pose"]},
    {emoji:"🏃",title:"Cardio Blast",dur:"30 min",level:"Intense",color:T.gold,steps:["5 min warm-up walk","1 min sprint","2 min walk","Repeat x8","5 min cool-down"]},
    {emoji:"🍑",title:"Glute Sculpt",dur:"25 min",level:"Moderate",color:"#e04cb2",steps:["20 deadlifts","15 donkey kicks each side","20 glute bridges","15 lateral step-up squats","10 plie squats","Rest & repeat x2"]},
  ];
  if (active) return (
    <div>
      <button onClick={()=>setActive(null)} style={{background:T.faint,border:`1px solid ${T.border}`,borderRadius:12,padding:"8px 14px",color:T.text,fontSize:15,marginBottom:18}}>← Back</button>
      <Card glow={active.color} style={{textAlign:"center",marginBottom:18,background:`${active.color}0A`}}>
        <div style={{fontSize:52,marginBottom:10}}>{active.emoji}</div>
        <h3 style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:20}}>{active.title}</h3>
        <p style={{color:T.muted,fontSize:13}}>{active.dur} · {active.level}</p>
      </Card>
      {active.steps.map((s,i)=>(<div key={i} style={{display:"flex",gap:14,padding:"12px 16px",background:T.card,borderRadius:14,marginBottom:8,border:`1px solid ${T.border}`}}><span style={{color:active.color,fontWeight:800,fontSize:14,minWidth:22}}>{i+1}.</span><span style={{fontSize:14}}>{s}</span></div>))}
    </div>
  );
  return (<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>{WS.map((w,i)=>(<div key={i} onClick={()=>setActive(w)} className="hover-lift" style={{background:`${w.color}0E`,border:`1px solid ${w.color}25`,borderRadius:18,padding:"18px 14px",cursor:"pointer"}}><div style={{fontSize:30,marginBottom:10}}>{w.emoji}</div><div style={{fontWeight:700,fontSize:13,marginBottom:4}}>{w.title}</div><div style={{color:T.muted,fontSize:11,marginBottom:10}}>{w.dur}</div><Tag label={w.level} color={w.color}/></div>))}</div>);
};

const MeditateTab = () => {
  const [active, setActive] = useState(null);
  const [timer, setTimer] = useState(null);
  const [secs, setSecs] = useState(0);
  const ref = useRef(null);
  const startTimer = (mins) => { setTimer(mins * 60); setSecs(mins * 60); };
  useEffect(() => {
    if (timer === null) return;
    if (timer === 0) { clearInterval(ref.current); return; }
    ref.current = setInterval(() => setTimer(t => t - 1), 1000);
    return () => clearInterval(ref.current);
  }, [timer !== null]);
  const MS = [
    {emoji:"🌊",title:"Box Breathing",dur:"5 min",color:T.cyan,steps:["Inhale for 4 counts","Hold for 4 counts","Exhale for 4 counts","Hold for 4 counts","Repeat 5 times slowly"]},
    {emoji:"🌿",title:"Body Scan",dur:"10 min",color:T.green,steps:["Lie down comfortably","Focus on feet — release tension","Move attention up to legs","Scan your torso and chest","Reach your head and face","Rest in stillness"]},
    {emoji:"☀️",title:"Morning Intention",dur:"7 min",color:T.gold,steps:["Sit quietly, spine straight","Take 3 deep breaths","Set your intention for today","Visualize your day going well","Express gratitude for 3 things"]},
    {emoji:"🌙",title:"Sleep Wind-Down",dur:"12 min",color:T.purple,steps:["Dim the lights","Breathe: 4-7-8 method","Release thoughts without judgment","Body scan from toes up","Drift into sleep"]},
  ];
  if (timer !== null) {
    const m = Math.floor(timer / 60), s = timer % 60;
    const pct = (1 - timer / secs) * 100;
    return (<div style={{textAlign:"center",padding:"20px 0"}}><button onClick={()=>{setTimer(null);clearInterval(ref.current);}} style={{background:T.faint,border:`1px solid ${T.border}`,borderRadius:12,padding:"8px 14px",color:T.text,fontSize:15,marginBottom:24}}>← Stop</button><div style={{position:"relative",width:180,height:180,margin:"0 auto 24px"}}><svg viewBox="0 0 36 36" style={{width:180,height:180,transform:"rotate(-90deg)"}}><circle cx="18" cy="18" r="15.9" fill="none" stroke={T.faint} strokeWidth="2"/><circle cx="18" cy="18" r="15.9" fill="none" stroke={T.cyan} strokeWidth="2" strokeDasharray={`${pct} 100`} strokeLinecap="round" style={{transition:"stroke-dasharray 1s linear"}}/></svg><div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column"}}><div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:36,color:T.cyan}}>{m}:{s.toString().padStart(2,"0")}</div><div style={{color:T.muted,fontSize:12}}>remaining</div></div></div><p style={{color:T.muted,fontSize:14}}>Breathe deeply. You're doing great. 🌿</p>{timer===0&&<p style={{color:T.green,fontWeight:700,fontSize:16,marginTop:16}}>Session complete ✨</p>}</div>);
  }
  return (<div>{MS.map((m,i)=>(<div key={i} onClick={()=>setActive(active===i?null:i)} style={{background:active===i?`${m.color}0E`:T.card,border:`1px solid ${active===i?m.color:T.border}`,borderRadius:18,padding:"14px 16px",marginBottom:12,cursor:"pointer",transition:"all 0.22s"}}><div style={{display:"flex",alignItems:"center",gap:12}}><span style={{fontSize:28}}>{m.emoji}</span><div style={{flex:1}}><div style={{fontWeight:700,fontSize:15}}>{m.title}</div><div style={{color:T.muted,fontSize:12}}>{m.dur}</div></div><span style={{color:m.color,fontSize:18}}>{active===i?"▲":"▼"}</span></div>{active===i&&(<div style={{marginTop:14}}>{m.steps.map((step,j)=>(<div key={j} style={{display:"flex",gap:10,padding:"7px 0",borderTop:`1px solid ${T.faint}`}}><span style={{color:m.color,fontWeight:700,fontSize:12,minWidth:18}}>{j+1}.</span><span style={{color:T.muted,fontSize:13}}>{step}</span></div>))}<button onClick={e=>{e.stopPropagation();startTimer(parseInt(m.dur));}} style={{marginTop:14,background:`${m.color}18`,border:`1px solid ${m.color}40`,borderRadius:14,padding:"10px 20px",color:m.color,fontFamily:"'DM Sans',sans-serif",fontWeight:700,fontSize:13,cursor:"pointer",width:"100%"}}>▶ Start {m.dur} Timer</button></div>)}</div>))}</div>);
};

const Hub = ({ state, nav, userState }) => {
  const [tab, setTab] = useState("routines");
  const tabs = [
    {id:"routines",label:"Routines",icon:"📋"},{id:"workout",label:"Workout",icon:"💪"},
    {id:"meditate",label:"Meditate",icon:"🧘"},
  ];
  return (
    <Shell>
      <Bar />
      <LoadBar load={state.load} />
      <div style={{ flex: 1, display: "flex", flexDirection: "column", overflow: "hidden" }}>
        <div style={{ padding: "12px 24px 0", flexShrink: 0 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 14 }}>
            <Back onClick={() => nav("home")} />
            <h2 style={{ fontFamily: "'Syne',sans-serif", fontWeight: 800, fontSize: 19 }}>Mental Health Hub ✦</h2>
          </div>
          <div style={{ display: "flex", gap: 6, overflowX: "auto", marginBottom: 16, paddingBottom: 4 }}>
            {tabs.map(t => (
              <button key={t.id} onClick={() => setTab(t.id)} style={{ background: tab === t.id ? T.grad1 : "rgba(255,255,255,0.06)", border: `1px solid ${tab === t.id ? "transparent" : T.border}`, borderRadius: 20, padding: "7px 14px", color: "#fff", fontSize: 12, fontWeight: 700, cursor: "pointer", whiteSpace: "nowrap", fontFamily: "'DM Sans',sans-serif", boxShadow: tab === t.id ? "0 4px 16px rgba(255,77,141,0.3)" : "none", flexShrink: 0, transition: "all 0.18s" }}>
                {t.icon} {t.label}
              </button>
            ))}
          </div>
        </div>
        <div style={{ flex: 1, overflowY: "auto", padding: "0 24px 100px" }}>
          {tab === "routines"  && <RoutinesTab userState={userState} />}
          {tab === "workout"   && <WorkoutsTab />}
          {tab === "meditate"  && <MeditateTab />}
        </div>
      </div>
      <Nav screen="hub" nav={nav} />
    </Shell>
  );
};

// ══════════════════════════════════════════════════════════════════════════════
//  ROOT APP
// ══════════════════════════════════════════════════════════════════════════════
function DecisionReset() {
  const [state, dispatch] = useReducer(reduce, init);
  const [screen, setScreen] = useState("welcome");
  const [userState, setUserState] = useState(initUser);
  const nav = useCallback((s) => setScreen(s), []);
  const p = { state, dispatch, nav, userState, setUserState };

  const SCREENS = {
    welcome:  <Welcome  {...p} />,
    home:     <Home     {...p} />,
    checkin:  <CheckIn  {...p} />,
    dump:     <Dump     {...p} />,
    focus:    <Focus    {...p} />,
    action:   <Action   {...p} />,
    relief:   <Relief   {...p} />,
    progress: <Progress {...p} />,
    profile:  <Profile  {...p} />,
    journal:  <Journal  {...p} />,
    hub:      <Hub      {...p} />,
  };

  return (
    <div style={{ minHeight: "100vh", background: T.bg, display: "flex", alignItems: "center", justifyContent: "center", flexDirection: "column", padding: 24, gap: 18 }}>
      <CSS />
      <p style={{ color: "rgba(255,255,255,0.2)", fontSize: 11, letterSpacing: 1.5, textTransform: "uppercase" }}>Decision Reset · AI Mental Wellness</p>
      <div style={{ position: "relative" }}>
        {SCREENS[screen] || SCREENS.welcome}
        <Nav screen={screen} nav={nav} />
      </div>
      <div style={{ display: "flex", flexWrap: "wrap", gap: 6, justifyContent: "center", maxWidth: 480 }}>
        {Object.keys(SCREENS).map(s => (
          <button key={s} onClick={() => nav(s)} style={{ background: screen === s ? T.grad1 : "rgba(255,255,255,0.07)", border: "none", borderRadius: 8, padding: "5px 11px", color: "#fff", fontSize: 10, fontWeight: 700, cursor: "pointer", fontFamily: "'DM Sans',sans-serif", letterSpacing: 0.3, boxShadow: screen === s ? "0 2px 12px rgba(255,77,141,0.35)" : "none", transition: "all 0.15s" }}>
            {s}
          </button>
        ))}
      </div>
      <p style={{ color: "rgba(255,255,255,0.15)", fontSize: 10 }}>↑ Jump to any screen</p>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(DecisionReset));
  </script>
</body>
