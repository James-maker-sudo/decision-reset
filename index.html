// ── App State ─────────────────────────────────────────────────────────────────
const init = {
  name: "", mood: null, overwhelm: 5, moodLog: [], problems: [], streak: 0,
  lastDate: null, tasksTotal: 0, tasksDone: 0, load: 100, started: false,
};

function reduce(s, a) {
  switch (a.type) {
    case "START": {
      const today = new Date().toDateString();
      let streak = s.streak;
      if (s.lastDate) {
        const d = Math.floor((new Date() - new Date(s.lastDate)) / 86400000);
        streak = d === 1 ? streak + 1 : d > 1 ? 1 : streak;
      } else { streak = 1; }
      return { ...s, name: a.name, started: true, lastDate: today, streak };
    }
    case "MOOD":     return { ...s, mood: a.v };
    case "OVERWHELM":return { ...s, overwhelm: a.v };
    case "LOG_MOOD": return { ...s, moodLog: [...s.moodLog.slice(-29), { mood: s.mood, overwhelm: s.overwhelm, date: new Date().toLocaleDateString() }] };
    case "SET_PROBS":return { ...s, problems: a.v, tasksTotal: s.tasksTotal + a.v.length };
    case "ACTIVATE": return { ...s, problems: s.problems.map(p => ({ ...p, active: p.id === a.id })) };
    case "SET_STEPS":return { ...s, problems: s.problems.map(p => p.id === a.id ? { ...p, steps: a.steps } : p) };
    case "TOGGLE_STEP": {
      let delta = 0;
      const probs = s.problems.map(p => {
        if (!p.active) return p;
        const steps = p.steps.map(st => {
          if (st.id !== a.id) return st;
          delta += st.done ? -1 : 1;
          return { ...st, done: !st.done };
        });
        return { ...p, steps };
      });
      const total = Math.max(1, s.problems.reduce((x, p) => x + p.steps.length, 0));
      return { ...s, problems: probs, tasksDone: Math.max(0, s.tasksDone + delta), load: Math.max(0, Math.round((s.load - delta * (80 / total)) * 10) / 10) };
    }
    case "COMPLETE": return { ...s, problems: s.problems.map(p => p.id === a.id ? { ...p, done: true, active: false } : p), load: Math.max(0, s.load - 15) };
    case "RESET":    return { ...init };
    default: return s;
  }
}

// ── Supabase client (lazy-loaded, no npm needed — uses CDN) ───────────────────
let _supabase = null;
function getSupabase() {
  if (_supabase) return _supabase;
  if (typeof window !== "undefined" && window.supabase) {
    _supabase = window.supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
    return _supabase;
  }
  return null;
}

// Load Supabase SDK from CDN
(function loadSupabaseSDK() {
  if (document.getElementById("supabase-sdk")) return;
  const s = document.createElement("script");
  s.id = "supabase-sdk";
  s.src = "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js";
  s.onload = () => { _supabase = window.supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY); };
  document.head.appendChild(s);
})();

// ── AI helper — calls Vercel proxy (key stays server-side) ────────────────────
async function ai(prompt, max = 600, plan = "free") {
  try {
    const r = await fetch(CONFIG.API_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        messages: [{ role: "user", content: prompt }],
        max_tokens: max,
        plan,
      }),
    });
    if (!r.ok) throw new Error(`API ${r.status}`);
    const d = await r.json();
    return d.content?.[0]?.text || "";
  } catch {
    // Fallback: direct call for development / when proxy not set up yet
    try {
      const r2 = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ model: "claude-sonnet-4-20250514", max_tokens: max, messages: [{ role: "user", content: prompt }] }),
      });
      const d2 = await r2.json();
      return d2.content?.[0]?.text || "";
    } catch { return ""; }
  }
}

// ── Supabase auth & data helpers ──────────────────────────────────────────────
const DB = {
  // Auth
  async signUp(email, password, username) {
    const sb = getSupabase(); if (!sb) throw new Error("Supabase not ready");
    const { data, error } = await sb.auth.signUp({
      email, password,
      options: { data: { username } }
    });
    if (error) throw error;
    return data.user;
  },
  async signIn(email, password) {
    const sb = getSupabase(); if (!sb) throw new Error("Supabase not ready");
    const { data, error } = await sb.auth.signInWithPassword({ email, password });
    if (error) throw error;
    return data.user;
  },
  async signOut() {
    const sb = getSupabase(); if (!sb) return;
    await sb.auth.signOut();
  },
  async getSession() {
    const sb = getSupabase(); if (!sb) return null;
    const { data } = await sb.auth.getSession();
    return data?.session?.user || null;
  },
  // Profile
  async getProfile(userId) {
    const sb = getSupabase(); if (!sb) return null;
    const { data } = await sb.from("profiles").select("*").eq("id", userId).single();
    return data;
  },
  async updateProfile(userId, updates) {
    const sb = getSupabase(); if (!sb) return;
    await sb.from("profiles").update(updates).eq("id", userId);
  },
  // Mood log
  async logMood(userId, mood, overwhelm) {
    const sb = getSupabase(); if (!sb) return;
    await sb.from("mood_logs").insert({ user_id: userId, mood_label: mood.l, mood_emoji: mood.e, mood_score: mood.s, overwhelm });
  },
  // Journal
  async saveJournal(userId, prompt, content) {
    const sb = getSupabase(); if (!sb) return;
    await sb.from("journal_entries").insert({ user_id: userId, prompt, content });
  },
  async getJournals(userId, limit = 10) {
    const sb = getSupabase(); if (!sb) return [];
    const { data } = await sb.from("journal_entries").select("*").eq("user_id", userId).order("created_at", { ascending: false }).limit(limit);
    return data || [];
  },
  // Reset sessions
  async saveSession(userId, problems) {
    const sb = getSupabase(); if (!sb) return;
    const done = problems.every(p => p.done);
    await sb.from("reset_sessions").insert({ user_id: userId, problems, completed: done, completed_at: done ? new Date().toISOString() : null });
  },
  // Stripe checkout
  async startCheckout(userId, userEmail, plan) {
    const r = await fetch(CONFIG.CHECKOUT_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ userId, userEmail, plan }),
    });
    const { url, error } = await r.json();
    if (error) throw new Error(error);
    window.location.href = url; // Redirect to Stripe Checkout
  },
};

const Welcome = ({ dispatch, nav, userState, setUserState }) => {
  const [mode, setMode]         = useState("main");
  const [name, setName]         = useState("");
  const [email, setEmail]       = useState("");
  const [password, setPassword] = useState("");
  const [loading, setLoading]   = useState(false);
  const [error, setError]       = useState("");
  const [checking, setChecking] = useState(true);

  useEffect(() => {
    const checkSession = async () => {
      try {
        const params = new URLSearchParams(window.location.search);
        if (params.get("upgrade") === "success") {
          window.history.replaceState({}, "", window.location.pathname);
        }
        const user = await DB.getSession();
        if (user) {
          const profile = await DB.getProfile(user.id);
          if (profile) { resumeSession(user, profile); return; }
        }
      } catch {}
      setChecking(false);
    };
    setTimeout(checkSession, 900);
  }, []);

  const resumeSession = (user, profile) => {
    const isPro = profile.plan === "pro";
    dispatch({ type: "START", name: profile.username || profile.email?.split("@")[0] || "Friend" });
    setUserState({
      plan: isPro ? PLANS.PRO : PLANS.FREE,
      name: profile.username || "",
      username: profile.username || "",
      email: profile.email || user.email || "",
      phone: profile.phone || "",
      notifications: profile.notifications || { email: false, sms: false, dailyReminder: false, weeklyInsight: false },
      resetsUsed: profile.resets_used || 0,
      resetsLimit: isPro ? 999 : (profile.resets_limit || 3),
      signupDate: profile.created_at,
      supabaseId: user.id,
      stripeCustomerId: profile.stripe_customer_id || null,
    });
    nav("home");
  };

  const handleSignUp = async () => {
    if (!name.trim() || !email.trim() || password.length < 6) {
      setError("Fill all fields. Password needs 6+ characters."); return;
    }
    setLoading(true); setError("");
    try {
      const user = await DB.signUp(email.trim(), password, name.trim());
      if (user) {
        await new Promise(r => setTimeout(r, 1000));
        const profile = await DB.getProfile(user.id) || { plan: "free", resets_used: 0, resets_limit: 3 };
        resumeSession(user, profile);
      }
    } catch (e) { setError(e.message || "Sign up failed. Try again."); }
    setLoading(false);
  };

  const handleLogin = async () => {
    if (!email.trim() || !password) { setError("Enter your email and password."); return; }
    setLoading(true); setError("");
    try {
      const user = await DB.signIn(email.trim(), password);
      if (user) {
        const profile = await DB.getProfile(user.id);
        if (profile) resumeSession(user, profile);
      }
    } catch (e) { setError(e.message === "Invalid login credentials" ? "Wrong email or password." : e.message || "Login failed."); }
    setLoading(false);
  };

  const startGuest = () => {
    dispatch({ type: "START", name: "Guest" });
    setUserState(u => ({ ...u, plan: PLANS.GUEST, name: "Guest", username: "Guest" }));
    nav("home");
  };

  const inp = { width: "100%", background: T.card, border: `1px solid ${T.border}`, borderRadius: 14, padding: "14px 18px", color: T.text, fontSize: 16 };

  if (checking) return (
    <Shell>
      <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", flexDirection: "column", gap: 16 }}>
        <div className="float" style={{ fontSize: 64 }}>🧠</div>
        <Spinner />
        <p style={{ color: T.muted, fontSize: 13 }}>Loading your session…</p>
      </div>
    </Shell>
  );

  return (
    <Shell>
      <div style={{ flex: 1, display: "flex", flexDirection: "column", justifyContent: "center", padding: "0 32px 48px", gap: 20 }}>
        <div style={{ textAlign: "center" }}>
          <div className="float" style={{ fontSize: 72, marginBottom: 16, display: "block" }}>🧠</div>
          <h1 style={{ fontFamily: "'Syne',sans-serif", fontSize: 34, fontWeight: 800, marginBottom: 8, background: T.grad1, WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent" }}>Decision Reset</h1>
          <p style={{ color: T.muted, fontSize: 14, lineHeight: 1.65 }}>AI-powered clarity for overwhelmed minds.</p>
        </div>

        {error && (
          <div style={{ background: `${T.coral}12`, border: `1px solid ${T.coral}30`, borderRadius: 12, padding: "10px 14px" }}>
            <p style={{ color: T.coral, fontSize: 13 }}>⚠ {error}</p>
          </div>
        )}

        {mode === "main" && (
          <>
            <Btn onClick={() => { setMode("signup"); setError(""); }}>Create Free Account →</Btn>
            <Btn outline onClick={() => { setMode("login"); setError(""); }}>Sign In</Btn>
            <button onClick={startGuest} style={{ background: "none", border: "none", color: T.muted, fontSize: 13, cursor: "pointer", textAlign: "center" }}>Continue as Guest (data not saved)</button>
          </>
        )}

        {mode === "signup" && (
          <>
            <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
              <input value={name} onChange={e => setName(e.target.value)} placeholder="Your first name" style={inp} />
              <input type="email" value={email} onChange={e => setEmail(e.target.value)} placeholder="Email address" style={inp} />
              <input type="password" value={password} onChange={e => setPassword(e.target.value)} placeholder="Password (6+ characters)" style={inp} />
            </div>
            <div style={{ background: `${T.green}0A`, border: `1px solid ${T.green}25`, borderRadius: 14, padding: "12px 16px" }}>
              <p style={{ color: T.green, fontSize: 12, fontWeight: 700, marginBottom: 4 }}>Free plan includes:</p>
              <p style={{ color: T.muted, fontSize: 12, lineHeight: 1.6 }}>✓ 3 resets/month  ✓ AI-tailored steps  ✓ Journal  ✓ History saved</p>
            </div>
            <Btn disabled={loading} onClick={handleSignUp}>{loading ? "Creating account…" : "Begin Your Reset →"}</Btn>
            <button onClick={() => { setMode("main"); setError(""); }} style={{ background: "none", border: "none", color: T.muted, fontSize: 13, cursor: "pointer", textAlign: "center" }}>← Back</button>

        {mode === "login" && (

// ── Daily Quote Component ──────────────────────────────────────────────────────
const DailyQuote = ({ userName }) => {
  const [quote, setQuote] = useState(null);
  const [loading, setLoading] = useState(true);
  const [flipping, setFlipping] = useState(false);
  const [quoteKey, setQuoteKey] = useState(0);

  // Pick a quote — seeded by 12-hour window so it changes twice a day
  const getSeededQuote = () => {
    const now = new Date();
    // Seed = date + AM/PM window (changes every 12 hours)
    const seed = now.getFullYear() * 10000 + (now.getMonth() + 1) * 100 + now.getDate() + (now.getHours() >= 12 ? 1000 : 0);
    const idx = seed % QUOTE_BANK.length;
    return QUOTE_BANK[idx];
  };

  const fetchAIQuote = async () => {
    try {
      const mood = userName ? `for someone named ${userName} who is working on their mental wellness` : "for someone working on mental clarity and emotional wellbeing";
      const raw = await ai(`Generate one original, profound quote ${mood}. It should feel fresh — not a famous quote people already know. Max 20 words. Warm, direct, and empowering.
Return ONLY valid JSON: {"text":"the quote here","author":"Decision Reset"}`, 120);
      const cleaned = raw.replace(/```json\s*/gi, "").replace(/```\s*/gi, "").trim();
      const jsonMatch = cleaned.match(/\{[\s\S]*?\}/);
      if (!jsonMatch) return null;
      const parsed = JSON.parse(jsonMatch[0]);
      if (parsed.text && parsed.text.length > 5) return parsed;
      return null;
    } catch { return null; }
  };

  useEffect(() => {
    let cancelled = false;
    const load = async () => {
      // Show seeded quote instantly
      const seeded = getSeededQuote();
      if (!cancelled) { setQuote(seeded); setLoading(false); }
      // Then try AI upgrade in background
      const aiQuote = await fetchAIQuote();
      if (!cancelled && aiQuote) {
        setFlipping(true);
        setTimeout(() => {
          if (!cancelled) { setQuote(aiQuote); setFlipping(false); setQuoteKey(k => k + 1); }
        }, 300);
      }
    };
    load();
    return () => { cancelled = true; };
  }, []);

  const refreshQuote = async () => {
    setFlipping(true);
    const aiQuote = await fetchAIQuote();
    setTimeout(() => {
      const next = aiQuote || QUOTE_BANK[Math.floor(Math.random() * QUOTE_BANK.length)];
      setQuote(next); setFlipping(false); setQuoteKey(k => k + 1);
    }, 300);
  };

  // Rotating gradient accents per quote index
  const accents = [T.pink, T.purple, T.cyan, T.gold, T.green, T.coral];
  const accentColor = accents[quoteKey % accents.length];

  return (
    <div style={{ marginTop: 20, animation: "up 0.5s cubic-bezier(.22,.68,0,1.2) 0.3s both" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
        <p style={{ color: T.muted, fontSize: 11, fontWeight: 700, letterSpacing: 1.5, textTransform: "uppercase" }}>✦ Daily Wisdom</p>
        <button onClick={refreshQuote} disabled={flipping} style={{ background: "none", border: `1px solid ${T.border}`, borderRadius: 20, padding: "4px 12px", color: T.muted, fontSize: 11, fontWeight: 600, cursor: "pointer", display: "flex", alignItems: "center", gap: 5, transition: "all 0.2s", opacity: flipping ? 0.4 : 1 }}>
          <span style={{ display: "inline-block", transform: flipping ? "rotate(180deg)" : "rotate(0deg)", transition: "transform 0.3s" }}>↺</span> New
        </button>
      </div>

      <div key={quoteKey} style={{
        background: `linear-gradient(135deg, ${accentColor}10, ${T.purple}08)`,
        border: `1px solid ${accentColor}30`,
        borderRadius: 22,
        padding: "22px 20px",
        position: "relative",
        overflow: "hidden",
        opacity: flipping ? 0 : 1,
        transform: flipping ? "translateY(8px)" : "translateY(0)",
        transition: "opacity 0.3s, transform 0.3s",
      }}>
        {/* Decorative quote mark */}
        <div style={{
          position: "absolute", top: 10, left: 16,
          fontSize: 64, lineHeight: 1, color: accentColor, opacity: 0.12,
          fontFamily: "Georgia, serif", fontWeight: 900, userSelect: "none",
        }}>"</div>

        {/* Glowing dot accent */}
        <div style={{
          position: "absolute", top: 14, right: 14,
          width: 8, height: 8, borderRadius: "50%",
          background: accentColor, opacity: 0.6,
          boxShadow: `0 0 10px ${accentColor}`,
          animation: "ping 2s ease-in-out infinite",
        }} />

        {loading ? (
          <div style={{ display: "flex", alignItems: "center", gap: 10, padding: "8px 0" }}>
            <Spinner />
            <span style={{ color: T.muted, fontSize: 13 }}>Finding your quote…</span>
          </div>
        ) : (
          <>
            <p style={{
              fontFamily: "'Syne', sans-serif",
              fontSize: 15,
              fontWeight: 600,
              lineHeight: 1.65,
              color: T.text,
              marginBottom: 14,
              paddingLeft: 4,
              paddingTop: 8,
            }}>
              "{quote?.text}"
            </p>
            <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
              <div style={{ height: 1, flex: 1, background: `${accentColor}30` }} />
              <span style={{ color: accentColor, fontSize: 11, fontWeight: 700, letterSpacing: 0.5 }}>
                — {quote?.author || "Unknown"}
              </span>
            </div>
          </>
        )}
      </div>
    </div>
  );
};

          <h2 style={{ fontFamily: "'Syne',sans-serif", fontWeight: 800, fontSize: 20 }}>Daily Check-In</h2>
        </div>
        <p style={{ color: T.muted, fontSize: 14, marginBottom: 20 }}>How are you really feeling right now?</p>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 10, marginBottom: 32 }}>
          {moods.map((m, i) => {
            const on = state.mood?.l === m.l;
            return (
              <button key={i} onClick={() => dispatch({ type: "MOOD", v: m })} style={{ background: on ? `${T.pink}18` : T.card, border: `2px solid ${on ? T.pink : T.border}`, borderRadius: 18, padding: "18px 8px", transition: "all 0.18s", animation: `pop 0.35s cubic-bezier(.22,.68,0,1.2) ${i * 0.06}s both` }}>
                <div style={{ fontSize: 30, marginBottom: 8 }}>{m.e}</div>
                <div style={{ color: on ? T.pink : T.text, fontWeight: 600, fontSize: 12 }}>{m.l}</div>
              </button>
            );
          })}
        </div>
        <div style={{ marginBottom: 32 }}>
          <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 12 }}>
            <span style={{ color: T.muted, fontSize: 14 }}>Overwhelm level</span>
            <span style={{ fontFamily: "'Syne',sans-serif", fontWeight: 700, fontSize: 16, color: T.pink }}>{state.overwhelm} / 10</span>
          </div>
          <input type="range" min={1} max={10} value={state.overwhelm} onChange={e => dispatch({ type: "OVERWHELM", v: +e.target.value })} style={{ width: "100%" }} />
          <div style={{ display: "flex", justifyContent: "space-between", marginTop: 6 }}>
            <span style={{ color: T.muted, fontSize: 11 }}>Calm</span>
            <span style={{ color: T.muted, fontSize: 11 }}>Overwhelmed</span>
          </div>
        </div>
        <Btn disabled={!state.mood} onClick={() => { dispatch({ type: "LOG_MOOD" }); if (userState.supabaseId) DB.logMood(userState.supabaseId, state.mood, state.overwhelm); nav("dump"); }}>Continue to Brain Dump →</Btn>
      </div>
      <Nav screen="checkin" nav={nav} />
    </Shell>
  );
};

// ── Brain Dump ────────────────────────────────────────────────────────────────
const Dump = ({ state, dispatch, nav, userState, setUserState }) => {
  const [text, setText] = useState("");
  const [loading, setLoading] = useState(false);
  const [err, setErr] = useState("");
  const [showPaywall, setShowPaywall] = useState(false);
  const [paywallType, setPaywallType] = useState("guest_limit");
  const [showUpgradeModal, setShowUpgradeModal] = useState(false);
  const [checkoutLoading, setCheckoutLoading] = useState(false);

  const handleUpgrade = async (plan) => {
    setCheckoutLoading(true);
    try {
      await DB.startCheckout(userState.supabaseId, userState.email, plan);
    } catch (e) {
      // Stripe not connected yet — simulate for testing
      setUserState(u => ({ ...u, plan: PLANS.PRO, resetsLimit: 999 }));
      setShowUpgradeModal(false);
      setShowPaywall(false);
    }
    setCheckoutLoading(false);
  };

  const checkAccess = () => {
    if (userState.plan === PLANS.GUEST && userState.resetsUsed >= 1) {
      setPaywallType("guest_limit"); setShowPaywall(true); return false;
    }
    if (userState.plan === PLANS.FREE && userState.resetsUsed >= 3) {
      setPaywallType("free_lock"); setShowPaywall(true); return false;
    }
    return true;
  };

  const softNudge = () => {
    if (userState.plan === PLANS.FREE && userState.resetsUsed === 2) {
      setPaywallType("free_soft"); setShowPaywall(true);
    }
  };

  const analyze = async () => {
    if (!checkAccess()) return;
    if (!text.trim()) return;
    setLoading(true); setErr("");
    try {
      const raw = await ai(`Extract 2-4 problems from this brain dump. Return ONLY JSON array, no markdown:\n[{"id":"p1","title":"short title","description":"one sentence","priority":8,"category":"work|personal|health|finance|relationship","emoji":"📋"}]\n\nBrain dump: "${text}"`);
      const problems = JSON.parse(raw.replace(/```json|```/g, "").trim());
      dispatch({ type: "SET_PROBS", v: problems.map(p => ({ ...p, steps: [], active: false, done: false })) });
      setUserState(u => ({ ...u, resetsUsed: u.resetsUsed + 1 }));
      softNudge();
      nav("focus");
    } catch {
      setErr("AI unavailable — using quick mode.");
      const probs = text.split("\n").filter(l => l.trim()).slice(0, 4).map((l, i) => ({
        id: `p${i}`, title: l.trim().slice(0, 50), description: l.trim(),
        priority: 8 - i * 2, category: "personal", emoji: "📋", steps: [], active: false, done: false,
      }));
      dispatch({ type: "SET_PROBS", v: probs });
      setUserState(u => ({ ...u, resetsUsed: u.resetsUsed + 1 }));
      nav("focus");
    }
    setLoading(false);
  };

  return (
    <Shell>
      <Bar />
      {showPaywall && (
        <Paywall
          type={paywallType}
          onClose={paywallType === "free_soft" ? () => setShowPaywall(false) : null}
          onUpgrade={() => { setShowPaywall(false); setShowUpgradeModal(true); }}
          onCreateAccount={() => { setUserState(u => ({ ...u, plan: PLANS.FREE, resetsLimit: 3, resetsUsed: 0, signupDate: new Date().toISOString() })); setShowPaywall(false); }}
        />
      )}
      {showUpgradeModal && (
        <UpgradeModal
          loading={checkoutLoading}
          onClose={() => setShowUpgradeModal(false)}
          onSelect={handleUpgrade}
        />
      )}
      <div style={{ flex: 1, overflowY: "auto", padding: "16px 24px 40px" }}>
        <div style={{ display: "flex", gap: 12, alignItems: "center", marginBottom: 20 }}>
          <Back onClick={() => nav("home")} />
          <h2 style={{ fontFamily: "'Syne',sans-serif", fontWeight: 800, fontSize: 20 }}>Brain Dump 🧠</h2>
          {userState.plan === PLANS.FREE && (
            <span style={{ marginLeft: "auto", color: T.muted, fontSize: 12, fontWeight: 700 }}>{userState.resetsUsed}/{userState.resetsLimit}</span>
          )}
        </div>
        <p style={{ color: T.muted, fontSize: 13, lineHeight: 1.65, marginBottom: 18 }}>Get everything out. Don't filter — just write what's weighing on you, one thing per line.</p>
        <textarea value={text} onChange={e => setText(e.target.value)} placeholder={"Work deadline tomorrow…\nForgot to call mom\nBills are due\nFeeling disconnected…"} style={{ width: "100%", minHeight: 200, background: T.card, border: `1px solid ${T.border}`, borderRadius: 18, padding: 16, color: T.text, fontSize: 14, resize: "none", lineHeight: 1.7, marginBottom: 16 }} />
        {err && <p style={{ color: T.coral, fontSize: 12, marginBottom: 12 }}>{err}</p>}
        <Btn onClick={analyze} disabled={!text.trim() || loading} style={{ marginBottom: 10 }}>
          {loading ? <span style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 10 }}><Spinner /> Analyzing…</span> : "✨ Analyze with AI"}
        </Btn>
        <Btn outline onClick={() => {
          if (!checkAccess()) return;
          const probs = text.split("\n").filter(l => l.trim()).slice(0, 4).map((l, i) => ({ id: `p${i}`, title: l.trim().slice(0, 50), description: l.trim(), priority: 8 - i * 2, category: "personal", emoji: "📋", steps: [], active: false, done: false }));
          dispatch({ type: "SET_PROBS", v: probs }); setUserState(u => ({ ...u, resetsUsed: u.resetsUsed + 1 })); nav("focus");
        }} disabled={!text.trim()}>Skip AI →</Btn>
      </div>
      <Nav screen="dump" nav={nav} />
    </Shell>
  );
};

// ── Priority Focus — Sequential, one problem at a time ────────────────────────
const Focus = ({ state, dispatch, nav }) => {
  const sorted = [...state.problems].sort((a, b) => b.priority - a.priority);
  const pending = sorted.filter(p => !p.done);
  const completed = sorted.filter(p => p.done);
  const current = pending[0] || null;
  const totalProbs = state.problems.length;
  const doneCount = completed.length;
  const overallPct = totalProbs > 0 ? Math.round(doneCount / totalProbs * 100) : 0;

  const startCurrent = () => {
    if (!current) return;
    dispatch({ type: "ACTIVATE", id: current.id });
    nav("action");
  };

  return (
    <Shell>
      <Bar />
      <LoadBar load={state.load} />
      <div style={{ flex: 1, overflowY: "auto", padding: "16px 24px 100px" }}>
        <div style={{ display: "flex", gap: 12, alignItems: "center", marginBottom: 20 }}>
          <Back onClick={() => nav("dump")} />
          <h2 style={{ fontFamily: "'Syne',sans-serif", fontWeight: 800, fontSize: 20 }}>Priority Focus 🎯</h2>
        </div>

        {/* Overall session progress */}
        {totalProbs > 0 && (
          <Card glow={overallPct === 100 ? T.green : T.purple} style={{ marginBottom: 20, background: overallPct === 100 ? `${T.green}0A` : `${T.purple}08` }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
              <span style={{ fontWeight: 700, fontSize: 14 }}>Session Progress</span>
              <span style={{ fontFamily: "'Syne',sans-serif", fontWeight: 800, fontSize: 16, color: overallPct === 100 ? T.green : T.purple }}>{doneCount}/{totalProbs} done</span>
            </div>
            <div style={{ height: 6, background: T.faint, borderRadius: 3 }}>
              <div style={{ height: "100%", borderRadius: 3, background: overallPct === 100 ? T.green : T.grad1, width: `${overallPct}%`, transition: "width 0.8s cubic-bezier(.22,.68,0,1.2)" }} />
            </div>
            <div style={{ display: "flex", gap: 6, marginTop: 10, flexWrap: "wrap" }}>
              {sorted.map((p, i) => (
                <div key={p.id} style={{ width: 10, height: 10, borderRadius: "50%", background: p.done ? T.green : i === sorted.indexOf(current) ? T.pink : T.faint, transition: "background 0.4s", border: i === sorted.indexOf(current) ? `2px solid ${T.pink}` : "none" }} title={p.title} />
              ))}
            </div>
          </Card>
        )}

        {/* All done! */}
        {pending.length === 0 ? (
          <div className="up" style={{ textAlign: "center", padding: "40px 0" }}>
            <div className="float" style={{ fontSize: 72, marginBottom: 16 }}>🎉</div>
            <h3 style={{ fontFamily: "'Syne',sans-serif", fontSize: 24, fontWeight: 800, marginBottom: 8, background: T.grad3, WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent" }}>All Clear!</h3>
            <p style={{ color: T.muted, fontSize: 14, marginBottom: 24 }}>You tackled every single thing weighing on you. That takes real strength.</p>
            <Btn grad={T.grad3} onClick={() => nav("relief")} style={{ marginBottom: 10 }}>✨ Visit Relief Space</Btn>
            <Btn outline onClick={() => nav("dump")}>Add More Problems</Btn>
          </div>
        ) : (
          <>
            {/* Current problem — featured */}
            <div style={{ marginBottom: 8 }}>
              <p style={{ color: T.pink, fontSize: 11, fontWeight: 700, letterSpacing: 1.2, textTransform: "uppercase", marginBottom: 12 }}>
                {doneCount > 0 ? `✓ ${doneCount} done · Up next` : "Starting with your top priority"}
              </p>
              <div style={{ background: `linear-gradient(135deg,${T.pink}12,${T.purple}08)`, border: `2px solid ${T.pink}40`, borderRadius: 22, padding: 20, marginBottom: 20, animation: "up 0.4s cubic-bezier(.22,.68,0,1.2)" }}>
                <div style={{ display: "flex", gap: 14, alignItems: "flex-start", marginBottom: 16 }}>
                  <div style={{ width: 52, height: 52, borderRadius: 16, background: `${T.pink}18`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 28, flexShrink: 0 }}>{current.emoji}</div>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontFamily: "'Syne',sans-serif", fontWeight: 800, fontSize: 17, marginBottom: 5 }}>{current.title}</div>
                    <div style={{ color: T.muted, fontSize: 13, lineHeight: 1.5, marginBottom: 10 }}>{current.description}</div>
                    <div style={{ display: "flex", gap: 8 }}>
                      <Tag label={`Priority ${current.priority}/10`} color={T.pink} />
                      <Tag label={current.category} color={T.purple} />
                    </div>
                  </div>
                </div>
                <Btn onClick={startCurrent}>⚡ Start Tackling This →</Btn>
              </div>
            </div>

            {/* Upcoming queue — visible but locked */}
            {pending.length > 1 && (
              <>
                <p style={{ color: T.muted, fontSize: 11, fontWeight: 700, letterSpacing: 1.2, textTransform: "uppercase", marginBottom: 12 }}>Up next ({pending.length - 1} remaining)</p>
                {pending.slice(1).map((p, i) => (
                  <div key={p.id} style={{ display: "flex", gap: 14, padding: "14px 16px", background: T.card, border: `1px solid ${T.border}`, borderRadius: 16, marginBottom: 8, opacity: 0.5, animation: `up 0.4s cubic-bezier(.22,.68,0,1.2) ${(i + 1) * 0.08}s both` }}>
                    <div style={{ width: 36, height: 36, borderRadius: 12, background: T.faint, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 18, flexShrink: 0 }}>{p.emoji}</div>
                    <div style={{ flex: 1 }}>
                      <div style={{ fontWeight: 600, fontSize: 14, marginBottom: 3 }}>{p.title}</div>
                      <Tag label={`P${p.priority}/10`} color={T.muted} />
                    </div>
                    <span style={{ color: T.faint, fontSize: 16, alignSelf: "center" }}>🔒</span>
                  </div>
                ))}
              </>
            )}

            {/* Completed section */}
            {completed.length > 0 && (
              <>
                <p style={{ color: T.green, fontSize: 11, fontWeight: 700, letterSpacing: 1.2, textTransform: "uppercase", marginBottom: 12, marginTop: 20 }}>✓ Completed</p>
                {completed.map((p, i) => (
                  <div key={p.id} style={{ display: "flex", gap: 14, padding: "12px 16px", background: `${T.green}06`, border: `1px solid ${T.green}20`, borderRadius: 16, marginBottom: 8 }}>
                    <div style={{ width: 36, height: 36, borderRadius: 12, background: `${T.green}18`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 18, flexShrink: 0 }}>{p.emoji}</div>
                    <div style={{ flex: 1 }}>
                      <div style={{ fontWeight: 600, fontSize: 14, color: T.muted, textDecoration: "line-through" }}>{p.title}</div>
                    </div>
                    <span style={{ color: T.green, fontSize: 16, alignSelf: "center" }}>✓</span>
                  </div>
                ))}
              </>
            )}
          </>
        )}
      </div>
      <Nav screen="focus" nav={nav} />
    </Shell>
  );
};

// ── Action Mode — AI-tailored steps per specific problem ──────────────────────
const Action = ({ state, dispatch, nav, userState }) => {
  const prob = state.problems.find(p => p.active);
  const sorted = [...state.problems].sort((a, b) => b.priority - a.priority);
  const pending = sorted.filter(p => !p.done);
  const [loading, setLoading] = useState(false);
  const [aiInsight, setAiInsight] = useState("");
  const [showCelebration, setShowCelebration] = useState(false);
  const prevProbId = useRef(null);

  // Generate steps whenever a NEW problem becomes active
  useEffect(() => {
    if (!prob) return;
    if (prob.id !== prevProbId.current) {
      prevProbId.current = prob.id;
      setAiInsight("");
      setShowCelebration(false);
      if (!prob.steps?.length) genSteps();
    }
  }, [prob?.id]);

  const getSmartFallback = (title, description) => {
    const text = (title + " " + description).toLowerCase();

    // ── Investing / Money / Finance ──
    if (/invest|stock|etf|fund|portfolio|market|crypto|bitcoin|brokerage|401k|ira|dividend|asset|wealth|fidelity|vanguard|robinhood/.test(text)) return [
      { id:"s1", label:"Open a brokerage account (Fidelity, Schwab, or Robinhood) if you don't have one", done:false, mins:"15", tip:"The best investment is the one you actually start." },
      { id:"s2", label:"Research index funds and ETFs — start with S&P 500 (VOO or SPY)", done:false, mins:"20", tip:"ETFs give you instant diversification with low fees." },
      { id:"s3", label:"Set a monthly auto-invest amount, even if it's just $25", done:false, mins:"10", tip:"Consistency beats timing the market every time." },
      { id:"s4", label:"Learn one financial concept today: compound interest, dollar-cost averaging, or diversification", done:false, mins:"15", tip:"Financial literacy is the foundation of real wealth." },
      { id:"s5", label:"Write down your investing goal — retirement, wealth, passive income?", done:false, mins:"5", tip:"Your goal shapes your strategy." },
    ];

    // ── Relationship / Partner / Communication ──
    if (/relationship|partner|boyfriend|girlfriend|spouse|husband|wife|communicate|communication|argument|fight|trust|intimacy|couple|dating|ex|breakup|love/.test(text)) return [
      { id:"s1", label:"Write down exactly what you feel — not what happened, but how YOU feel", done:false, mins:"10", tip:"Clarity about your feelings is the first step to being heard." },
      { id:"s2", label:"Choose a calm moment to talk — not during or right after an argument", done:false, mins:"5", tip:"Timing is everything in difficult conversations." },
      { id:"s3", label:"Use 'I feel' statements instead of 'you always/never'", done:false, mins:"10", tip:"It shifts the conversation from blame to understanding." },
      { id:"s4", label:"Listen to understand, not to respond — ask one open question", done:false, mins:"15", tip:"Feeling truly heard changes everything." },
      { id:"s5", label:"Decide together on one small change you can both commit to this week", done:false, mins:"10", tip:"Small agreements build big trust." },
    ];

    // ── Job / Career / Work ──
    if (/job|career|work|boss|coworker|fired|quit|resume|interview|salary|promotion|workplace|office|burnout|profession|hire|employed/.test(text)) return [
      { id:"s1", label:`Write down specifically what's frustrating about "${title}" — be honest`, done:false, mins:"10", tip:"You can't solve what you haven't named clearly." },
      { id:"s2", label:"List what you can control right now vs. what you can't", done:false, mins:"10", tip:"Focus only on what's in your hands." },
      { id:"s3", label:"Identify one concrete next action — email, application, conversation, or skill", done:false, mins:"10", tip:"One action creates momentum." },
      { id:"s4", label:"Set a deadline: when will you take that action?", done:false, mins:"5", tip:"Decisions without deadlines stay wishes." },
    ];

    // ── Family / Parents / Kids / Mom / Dad ──
    if (/mom|dad|mother|father|parent|family|sibling|brother|sister|child|kids|son|daughter|grandma|grandpa|aunt|uncle|relative/.test(text)) return [
      { id:"s1", label:`Reach out to ${/mom|mother/.test(text) ? "your mom" : /dad|father/.test(text) ? "your dad" : "the family member"} today — a text, call, or voice memo`, done:false, mins:"5", tip:"Reconnection starts with one small reach." },
      { id:"s2", label:"Write down what you actually want to say or need from them", done:false, mins:"10", tip:"Getting clear privately helps you communicate better." },
      { id:"s3", label:"Set a specific time to connect this week — put it on your calendar", done:false, mins:"5", tip:"Scheduled care is still real care." },
      { id:"s4", label:"Let go of the need for a perfect outcome — focus on showing up", done:false, mins:"5", tip:"Effort matters even when results are uncertain." },
    ];

    // ── Health / Fitness / Sleep / Mental health ──
    if (/health|sick|doctor|anxiety|stress|sleep|tired|fatigue|workout|exercise|diet|weight|therapy|mental|depression|panic|pain|medical|medication/.test(text)) return [
      { id:"s1", label:"Schedule the appointment or action you've been avoiding", done:false, mins:"10", tip:"Done is better than perfect — book it now." },
      { id:"s2", label:"Write down your symptoms or concerns so you're prepared", done:false, mins:"10", tip:"Clarity reduces anxiety about hard conversations." },
      { id:"s3", label:"Identify one daily habit to start or stop this week", done:false, mins:"10", tip:"Health is built in small daily choices." },
      { id:"s4", label:"Tell one trusted person how you're actually doing", done:false, mins:"5", tip:"You don't have to carry this alone." },
    ];

    // ── Money / Bills / Debt / Budget ──
    if (/money|bill|debt|loan|credit|budget|rent|afford|broke|financial|spend|save|income|payment|owe|expense/.test(text)) return [
      { id:"s1", label:"Write down every amount owed or due — face the numbers exactly", done:false, mins:"15", tip:"Clarity is less scary than the unknown." },
      { id:"s2", label:"Prioritize: which is most urgent? Pay or contact that one first", done:false, mins:"10", tip:"One at a time always works." },
      { id:"s3", label:"Look up one option: payment plan, assistance program, or consolidation", done:false, mins:"20", tip:"There are almost always more options than you think." },
      { id:"s4", label:"Set a micro-goal: save or pay $X by a specific date", done:false, mins:"5", tip:"Small wins compound into big change." },
    ];

    // ── Friends / Social / Loneliness ──
    if (/friend|friendship|social|lonely|loneliness|connect|isolat|people|network|community|belong/.test(text)) return [
      { id:"s1", label:"Reach out to one person you've been meaning to contact — just say hi", done:false, mins:"5", tip:"Relationships survive on small consistent touches." },
      { id:"s2", label:"Identify one place or activity where you could meet new people", done:false, mins:"10", tip:"Your people are out there — you have to go find them." },
      { id:"s3", label:"Be honest with yourself: what's been keeping you from connecting?", done:false, mins:"10", tip:"Awareness of the barrier is how you remove it." },
      { id:"s4", label:"Plan one real social interaction this week — coffee, walk, or call", done:false, mins:"5", tip:"Put it on the calendar so it actually happens." },
    ];

    // ── Self-improvement / Goals / Habits / Learning ──
    if (/goal|habit|self|improve|learn|skill|grow|discipline|motivation|procrastinat|focus|productivity|read|study|course|degree/.test(text)) return [
      { id:"s1", label:`Define what success looks like for "${title}" in specific, measurable terms`, done:false, mins:"10", tip:"Vague goals produce vague results." },
      { id:"s2", label:"Identify the single smallest daily action that moves you toward it", done:false, mins:"10", tip:"1% better every day is 37x better in a year." },
      { id:"s3", label:"Remove one obstacle or distraction blocking your progress", done:false, mins:"10", tip:"Subtraction is often more powerful than addition." },
      { id:"s4", label:"Track your first 7 days — check off each day you do the action", done:false, mins:"5", tip:"What gets measured gets done." },
    ];

    // ── Housing / Moving / Apartment ──
    if (/house|home|apartment|rent|move|moving|landlord|lease|neighborhood|roommate|mortgage/.test(text)) return [
      { id:"s1", label:"Write down your non-negotiables and nice-to-haves for your situation", done:false, mins:"10", tip:"Knowing what you need narrows the decision." },
      { id:"s2", label:"Research your specific options — listings, costs, timelines", done:false, mins:"20", tip:"Information turns vague anxiety into solvable steps." },
      { id:"s3", label:"Reach out to one person who can help — landlord, realtor, or friend who's done it", done:false, mins:"10", tip:"Most people are more helpful than you expect." },
      { id:"s4", label:"Set a decision deadline so this doesn't stay open-ended", done:false, mins:"5", tip:"Open loops drain energy. Close them." },
    ];

    // ── Default smart fallback — still uses the actual title ──
    return [
      { id:"s1", label:`Write down everything you know about "${title}" — all facts, feelings, and fears`, done:false, mins:"10", tip:"Getting it all out reduces its mental weight." },
      { id:"s2", label:"Identify the single root cause or the most urgent piece", done:false, mins:"10", tip:"Most problems have one key lever." },
      { id:"s3", label:`Find one concrete action you can take on "${title}" in the next 24 hours`, done:false, mins:"10", tip:"Action dissolves anxiety." },
      { id:"s4", label:"Tell one person about this — accountability changes everything", done:false, mins:"5", tip:"Saying it out loud makes it real and solvable." },
      { id:"s5", label:"Set a reminder to check your progress in 3 days", done:false, mins:"2", tip:"Follow-through is where goals live or die." },
    ];
  };

  const genSteps = async () => {
    if (!prob) return;
    setLoading(true);

    // STEP 1: Show smart keyword steps IMMEDIATELY — no waiting, no network needed
    const immediateSteps = getSmartFallback(prob.title, prob.description || "");
    dispatch({ type: "SET_STEPS", id: prob.id, steps: immediateSteps });
    setLoading(false); // User sees real tailored steps right away

    // STEP 2: Try to upgrade silently with AI in background
    try {
      const prompt = `You are a practical life coach. A person wrote: "${prob.title}". Description: "${prob.description || prob.title}".
Give 5 SPECIFIC steps for THIS exact problem only. CRITICAL: If about investing — mention ETFs, index funds, brokerage, Fidelity. If about relationship — mention talking to the person, boundaries, space. If about job — mention resume, boss, applying. Zero generic advice. Max 10 words per label.
Return ONLY valid JSON array, nothing else:
[{"id":"s1","label":"specific step","done":false,"mins":"10","tip":"encouragement"}]`;
      const raw = await ai(prompt, 700);
      const cleaned = raw.replace(/\`\`\`json\s*/gi, "").replace(/\`\`\`\s*/gi, "").trim();
      const jsonMatch = cleaned.match(/\[[\s\S]*?\]/);
      if (!jsonMatch) return;
      const steps = JSON.parse(jsonMatch[0]);
      if (!Array.isArray(steps) || steps.length === 0) return;
      const firstLabel = (steps[0]?.label || "").toLowerCase();
      const isGeneric = firstLabel.includes("sit with") || firstLabel.includes("write down what you can control") || firstLabel.includes("kind to yourself");
      if (!isGeneric) dispatch({ type: "SET_STEPS", id: prob.id, steps });
      try {
        const ins = await ai(`One warm specific sentence reframing: "${prob.title}". Not generic.`, 70);
        if (ins) setAiInsight(ins.replace(/^"|"$/g, "").trim());
      } catch {}
    } catch {}
  };

  const handleComplete = () => {
    setShowCelebration(true);
    dispatch({ type: "COMPLETE", id: prob.id });
    setTimeout(() => {
      setShowCelebration(false);
      // Check if there are more pending problems after this one
      const remaining = pending.filter(p => p.id !== prob.id);
      if (remaining.length > 0) {
        dispatch({ type: "ACTIVATE", id: remaining[0].id });
      } else {
        // All done — save completed session to Supabase
        if (userState.supabaseId) {
          DB.saveSession(userState.supabaseId, state.problems.map(p => p.id === prob.id ? { ...p, done: true } : p));
          // Increment resets used in DB
          DB.updateProfile(userState.supabaseId, { resets_used: (userState.resetsUsed || 0) + 1 });
        }
        nav("relief");
      }
    }, 2200);
  };

  if (!prob) return (
    <Shell>
      <Bar />
      <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", flexDirection: "column", gap: 16, padding: 24 }}>
        <span style={{ fontSize: 48 }}>🎯</span>
        <p style={{ color: T.muted, textAlign: "center" }}>No active problem. Go to Focus to select one.</p>
        <Btn onClick={() => nav("focus")} small>Go to Focus</Btn>
      </div>
    </Shell>
  );

  const done = prob.steps?.filter(s => s.done).length || 0;
  const total = prob.steps?.length || 1;
  const pct = Math.round(done / total * 100);
  const allStepsDone = pct === 100 && total > 0 && !loading;
  const probIndex = sorted.findIndex(p => p.id === prob.id);
  const remainingAfter = pending.filter(p => p.id !== prob.id).length;

  // Celebration overlay
  if (showCelebration) return (
    <Shell>
      <div style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: 32, gap: 20 }}>
        <div className="float" style={{ fontSize: 80 }}>🎊</div>
        <h2 style={{ fontFamily: "'Syne',sans-serif", fontWeight: 800, fontSize: 26, textAlign: "center", background: T.grad3, WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent" }}>
          {prob.title} — Done!
        </h2>
        <p style={{ color: T.muted, fontSize: 15, textAlign: "center", lineHeight: 1.7 }}>
          {remainingAfter > 0
            ? `Amazing work. Loading your next focus in a moment…`
            : `You've cleared your entire list. Incredible.`}
        </p>
        {remainingAfter > 0 && (
          <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
            <Spinner />
            <span style={{ color: T.muted, fontSize: 13 }}>Preparing next problem…</span>
          </div>
        )}
      </div>
    </Shell>
  );

  return (
    <Shell>
      <Bar />
      <LoadBar load={state.load} />
      <div style={{ flex: 1, overflowY: "auto", padding: "16px 24px 100px" }}>

        {/* Header with problem count */}
        <div style={{ display: "flex", gap: 12, alignItems: "center", marginBottom: 16 }}>
          <Back onClick={() => nav("focus")} />
          <h2 style={{ fontFamily: "'Syne',sans-serif", fontWeight: 800, fontSize: 20 }}>Action Mode ⚡</h2>
          <span style={{ marginLeft: "auto", background: `${T.pink}18`, border: `1px solid ${T.pink}30`, borderRadius: 20, padding: "4px 12px", color: T.pink, fontSize: 11, fontWeight: 700 }}>
            {probIndex + 1} of {sorted.length}
          </span>
        </div>

        {/* Problem card */}
        <Card glow={T.pink} style={{ marginBottom: aiInsight ? 10 : 18, background: `linear-gradient(135deg,${T.pink}10,${T.purple}06)` }}>
          <div style={{ display: "flex", gap: 14, alignItems: "flex-start", marginBottom: 14 }}>
            <div style={{ width: 48, height: 48, borderRadius: 14, background: `${T.pink}18`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 26, flexShrink: 0 }}>{prob.emoji}</div>
            <div style={{ flex: 1 }}>
              <div style={{ fontFamily: "'Syne',sans-serif", fontWeight: 800, fontSize: 16, marginBottom: 4 }}>{prob.title}</div>
              <div style={{ color: T.muted, fontSize: 12, marginBottom: 8 }}>{prob.description}</div>
              <div style={{ display: "flex", gap: 8 }}>
                <Tag label={`${done}/${total} steps`} color={pct === 100 ? T.green : T.pink} />
                <Tag label={prob.category} color={T.purple} />
              </div>
            </div>
          </div>
          <div style={{ height: 6, background: T.faint, borderRadius: 3 }}>
            <div style={{ height: "100%", borderRadius: 3, background: pct === 100 ? T.green : T.grad1, width: `${pct}%`, transition: "width 0.5s ease" }} />
          </div>
        </Card>

        {/* AI Insight */}
        {aiInsight && !loading && (
          <div style={{ background: `${T.cyan}08`, border: `1px solid ${T.cyan}20`, borderRadius: 14, padding: "10px 14px", marginBottom: 16, display: "flex", gap: 10, alignItems: "flex-start", animation: "up 0.4s ease" }}>
            <span style={{ fontSize: 16, flexShrink: 0 }}>💡</span>
            <p style={{ color: T.cyan, fontSize: 12, lineHeight: 1.6, fontStyle: "italic" }}>{aiInsight}</p>
          </div>
        )}

        {/* Loading state */}
        {loading && (
          <div style={{ textAlign: "center", padding: "36px 0" }}>
            <Spinner />
            <p style={{ color: T.muted, fontSize: 13, marginTop: 12 }}>AI analyzing "{prob.title}"…</p>
            <p style={{ color: T.faint, fontSize: 11, marginTop: 4 }}>Crafting steps tailored just for this</p>
          </div>
        )}

        {/* Steps */}
        {!loading && prob.steps?.map((s, i) => (
          <div key={s.id} onClick={() => dispatch({ type: "TOGGLE_STEP", id: s.id })}
            style={{ display: "flex", gap: 14, padding: "14px 16px", background: s.done ? `${T.green}0E` : T.card, border: `1px solid ${s.done ? T.green : T.border}`, borderRadius: 16, marginBottom: 10, cursor: "pointer", transition: "all 0.22s", animation: `up 0.4s cubic-bezier(.22,.68,0,1.2) ${i * 0.06}s both` }}>
            <div style={{ width: 30, height: 30, borderRadius: "50%", border: `2px solid ${s.done ? T.green : T.border}`, background: s.done ? T.green : "transparent", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, transition: "all 0.25s", marginTop: 2 }}>
              {s.done && <span style={{ color: "#000", fontSize: 13, fontWeight: 900, animation: "check 0.35s cubic-bezier(.22,.68,0,1.2)" }}>✓</span>}
              {!s.done && <span style={{ color: T.muted, fontSize: 10, fontWeight: 700 }}>{i + 1}</span>}
            </div>
            <div style={{ flex: 1 }}>
              <span style={{ fontWeight: 600, fontSize: 14, textDecoration: s.done ? "line-through" : "none", color: s.done ? T.muted : T.text, display: "block", marginBottom: s.mins || s.tip ? 4 : 0 }}>{s.label}</span>
              {s.mins && <span style={{ color: T.muted, fontSize: 11, marginRight: 8 }}>⏱ {s.mins} min</span>}
              {s.tip && !s.done && <p style={{ color: `${T.purple}CC`, fontSize: 11, marginTop: 4, fontStyle: "italic" }}>"{s.tip}"</p>}
            </div>
          </div>
        ))}

        {/* Complete button */}
        {allStepsDone && (
          <div style={{ animation: "up 0.4s cubic-bezier(.22,.68,0,1.2)" }}>
            <div style={{ background: `${T.green}0A`, border: `1px solid ${T.green}25`, borderRadius: 14, padding: "12px 16px", marginBottom: 14, textAlign: "center" }}>
              <p style={{ color: T.green, fontWeight: 700, fontSize: 14 }}>🎉 All steps complete!</p>
              {remainingAfter > 0 && <p style={{ color: T.muted, fontSize: 12, marginTop: 4 }}>{remainingAfter} more problem{remainingAfter > 1 ? "s" : ""} waiting for you</p>}
            </div>
            <Btn grad={remainingAfter > 0 ? T.grad1 : T.grad3} onClick={handleComplete}>
              {remainingAfter > 0 ? `✅ Done → Next Problem (${remainingAfter} left)` : "✅ Complete — All Done!"}
            </Btn>
          </div>
        )}
      </div>
      <Nav screen="action" nav={nav} />
    </Shell>
  );
};

// ── Relief ────────────────────────────────────────────────────────────────────
const Relief = ({ state, nav }) => {
  const [msg, setMsg] = useState("");
  const [loading, setLoading] = useState(true);
  useEffect(() => {
    ai(`Write a warm, genuine 2-sentence encouraging message for ${state.name || "someone"} who just made progress on their mental load. Not cheesy — real and human.`, 200)
      .then(t => { setMsg(t); setLoading(false); })
      .catch(() => { setMsg("You showed up for yourself today — that takes real courage. Keep going."); setLoading(false); });
  }, []);
  return (
    <Shell>
      <Bar />
      <div style={{ flex: 1, display: "flex", flexDirection: "column", justifyContent: "center", padding: "0 28px 48px", gap: 28 }}>
        <div className="up" style={{ textAlign: "center" }}>
          <div className="float" style={{ fontSize: 72, display: "block", marginBottom: 16 }}>🕊️</div>
          <h2 style={{ fontFamily: "'Syne',sans-serif", fontSize: 28, fontWeight: 800, marginBottom: 16 }}>Relief Space</h2>
          {loading ? <div style={{ display: "flex", justifyContent: "center" }}><Spinner /></div> : (
            <p style={{ color: T.muted, fontSize: 15, lineHeight: 1.75, fontStyle: "italic" }}>"{msg}"</p>
          )}
        </div>
        <Card glow={T.gold} style={{ textAlign: "center", background: `${T.gold}0A` }}>
          <div style={{ fontSize: 40, marginBottom: 8 }}>🔥</div>
          <div style={{ fontFamily: "'Syne',sans-serif", fontWeight: 800, fontSize: 22, color: T.gold }}>{state.streak}-Day Streak</div>
          <div style={{ color: T.muted, fontSize: 13, marginTop: 4 }}>Mental load: {Math.round(state.load)}% remaining</div>
        </Card>
        <Btn onClick={() => nav("home")}>← Back to Home</Btn>
        <Btn outline onClick={() => nav("hub")}>✦ Open Mental Hub</Btn>
      </div>
      <Nav screen="relief" nav={nav} />
    </Shell>
  );
};

// ── Progress ──────────────────────────────────────────────────────────────────
const Progress = ({ state }) => (
  <Shell>
    <Bar />
    <div style={{ flex: 1, overflowY: "auto", padding: "16px 24px 100px" }}>
      <h2 style={{ fontFamily: "'Syne',sans-serif", fontWeight: 800, fontSize: 22, marginBottom: 20 }}>Your Progress 📊</h2>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 24 }}>
        {[["🔥", state.streak, "Day Streak", T.gold], ["✅", state.tasksDone, "Tasks Done", T.green], ["🎯", `${state.tasksTotal === 0 ? 0 : Math.round(state.tasksDone / state.tasksTotal * 100)}%`, "Success Rate", T.cyan], ["🧠", `${Math.round(state.load)}%`, "Load Left", T.purple]].map(([e, v, l, c], i) => (
          <Card key={i} glow={c} style={{ textAlign: "center", animation: `up 0.4s cubic-bezier(.22,.68,0,1.2) ${i * 0.08}s both` }}>
            <div style={{ fontSize: 28, marginBottom: 8 }}>{e}</div>
            <div style={{ fontFamily: "'Syne',sans-serif", fontWeight: 800, fontSize: 24, color: c }}>{v}</div>
            <div style={{ color: T.muted, fontSize: 12 }}>{l}</div>
          </Card>
        ))}
      </div>
      <h3 style={{ fontWeight: 700, fontSize: 16, marginBottom: 14 }}>Mood History</h3>
      {state.moodLog.length === 0 ? (
        <Card><p style={{ color: T.muted, fontSize: 13 }}>No mood entries yet. Start a check-in!</p></Card>
      ) : state.moodLog.slice(-7).reverse().map((m, i) => (
        <div key={i} style={{ display: "flex", gap: 12, padding: "10px 14px", background: T.card, borderRadius: 14, marginBottom: 8, border: `1px solid ${T.border}` }}>
          <span style={{ fontSize: 20 }}>{m.mood?.e || "😐"}</span>
          <div style={{ flex: 1 }}>
            <div style={{ fontWeight: 600, fontSize: 13 }}>{m.mood?.l || "Unknown"}</div>
            <div style={{ color: T.muted, fontSize: 11 }}>Overwhelm: {m.overwhelm}/10</div>
          </div>
          <span style={{ color: T.muted, fontSize: 11 }}>{m.date}</span>
        </div>
      ))}
    </div>
    <Nav screen="progress" nav={() => {}} />
  </Shell>
);

// ══════════════════════════════════════════════════════════════════════════════
//  PROFILE — Fully Editable with Notifications
// ══════════════════════════════════════════════════════════════════════════════
const Profile = ({ state, dispatch, nav, userState, setUserState }) => {
  const [editMode, setEditMode] = useState(false);
  const [tab, setTab] = useState("profile"); // profile | notifications | plan
  const [form, setForm] = useState({
    username: userState.username || userState.name || "",
    email: userState.email || "",
    phone: userState.phone || "",
  });
  const [saved, setSaved] = useState(false);
  const [showUpgrade, setShowUpgrade] = useState(false);
  const [showUpgradeModal, setShowUpgradeModal] = useState(false);
  const [checkoutLoading, setCheckoutLoading] = useState(false);

  const handleUpgrade = async (plan) => {
    setCheckoutLoading(true);
    try {
      await DB.startCheckout(userState.supabaseId, userState.email, plan);
    } catch (e) {
      setUserState(u => ({ ...u, plan: PLANS.PRO, resetsLimit: 999 }));
      setShowUpgradeModal(false);
    }
    setCheckoutLoading(false);
  };

  const saveProfile = () => {
    setUserState(u => ({ ...u, username: form.username, email: form.email, phone: form.phone }));
    setSaved(true);
    setEditMode(false);
    setTimeout(() => setSaved(false), 2000);
  };

  const toggleNotif = (key) => {
    setUserState(u => ({ ...u, notifications: { ...u.notifications, [key]: !u.notifications[key] } }));
  };

  const isPro = userState.plan === PLANS.PRO;
  const isFree = userState.plan === PLANS.FREE;
  const isGuest = userState.plan === PLANS.GUEST;

  const planLabel = isPro ? "Pro ⚡" : isFree ? "Free" : "Guest";
  const planColor = isPro ? T.gold : isFree ? T.cyan : T.muted;

  const notifSettings = [
    { key: "dailyReminder", label: "Daily Check-In Reminder", desc: "Get nudged every day to check in", icon: "⏰" },
    { key: "weeklyInsight", label: "Weekly Insight Summary", desc: "Your patterns and progress each week", icon: "📊" },
    { key: "email", label: "Email Notifications", desc: "Reminders sent to your email", icon: "📧", requires: "email" },
    { key: "sms", label: "SMS Reminders", desc: "Text reminders to your phone", icon: "📱", requires: "phone" },
  ];

  return (
    <Shell>
      <Bar />
      {showUpgrade && (
        <Paywall
          type="free_soft"
          onClose={() => setShowUpgrade(false)}
          onUpgrade={() => { setShowUpgrade(false); setShowUpgradeModal(true); }}
        />
      )}
      {showUpgradeModal && (
        <UpgradeModal
          loading={checkoutLoading}
          onClose={() => setShowUpgradeModal(false)}
          onSelect={handleUpgrade}
        />
      )}
      <div style={{ flex: 1, overflowY: "auto", padding: "16px 24px 100px" }}>
        <h2 style={{ fontFamily: "'Syne',sans-serif", fontWeight: 800, fontSize: 22, marginBottom: 20 }}>Profile ◉</h2>

        {/* Avatar + Name */}
        <div style={{ textAlign: "center", marginBottom: 20 }}>
          <div style={{ width: 80, height: 80, borderRadius: "50%", background: T.grad1, margin: "0 auto 14px", display: "flex", alignItems: "center", justifyContent: "center", fontFamily: "'Syne',sans-serif", fontWeight: 800, fontSize: 36, position: "relative" }}>
            {(userState.username || userState.name || "G")[0].toUpperCase()}
            <div style={{ position: "absolute", bottom: 0, right: 0, width: 24, height: 24, borderRadius: "50%", background: planColor, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 10, border: `2px solid ${T.surface}` }}>
              {isPro ? "⚡" : isFree ? "✓" : "G"}
            </div>
          </div>
          <div style={{ fontFamily: "'Syne',sans-serif", fontWeight: 800, fontSize: 20 }}>{userState.username || userState.name || "Guest"}</div>
          <div style={{ color: planColor, fontSize: 13, marginTop: 4, fontWeight: 700 }}>Decision Reset {planLabel}</div>
        </div>

        {/* Tab nav */}
        <div style={{ display: "flex", gap: 6, marginBottom: 20 }}>
          {[["profile", "👤", "Profile"], ["notifications", "🔔", "Alerts"], ["plan", "⚡", "Plan"]].map(([id, icon, label]) => (
            <button key={id} onClick={() => setTab(id)} style={{ flex: 1, background: tab === id ? T.grad1 : "rgba(255,255,255,0.05)", border: `1px solid ${tab === id ? "transparent" : T.border}`, borderRadius: 14, padding: "10px 4px", color: "#fff", fontFamily: "'DM Sans',sans-serif", fontWeight: 700, fontSize: 11, cursor: "pointer", transition: "all 0.18s" }}>
              <div style={{ fontSize: 16, marginBottom: 2 }}>{icon}</div>{label}
            </button>
          ))}
        </div>

        {/* ── PROFILE TAB ── */}
        {tab === "profile" && (
          <div style={{ animation: "slideIn 0.3s ease" }}>
            {!editMode ? (
              <>
                {[["👤", "Username", userState.username || userState.name || "—"], ["📧", "Email", userState.email || "Not set"], ["📱", "Phone", userState.phone || "Not set"]].map(([icon, label, val], i) => (
                  <Card key={i} style={{ marginBottom: 10, display: "flex", alignItems: "center", gap: 14 }}>
                    <span style={{ fontSize: 20 }}>{icon}</span>
                    <div style={{ flex: 1 }}>
                      <div style={{ color: T.muted, fontSize: 11, fontWeight: 700, textTransform: "uppercase", letterSpacing: 0.5 }}>{label}</div>
                      <div style={{ fontWeight: 600, fontSize: 14, marginTop: 2 }}>{val}</div>
                    </div>
                  </Card>
                ))}

                {/* Stats */}
                {[["🔥", "Current Streak", `${state.streak} days`, T.gold], ["✅", "Tasks Completed", state.tasksDone, T.green], ["📊", "Success Rate", `${state.tasksTotal === 0 ? 0 : Math.round(state.tasksDone / state.tasksTotal * 100)}%`, T.cyan]].map(([e, l, v, c], i) => (
                  <Card key={i} style={{ marginBottom: 10, display: "flex", alignItems: "center", gap: 14 }}>
                    <span style={{ fontSize: 22 }}>{e}</span>
                    <div style={{ flex: 1, fontWeight: 600, fontSize: 14 }}>{l}</div>
                    <div style={{ fontFamily: "'Syne',sans-serif", fontWeight: 800, fontSize: 18, color: c }}>{v}</div>
                  </Card>
                ))}

                {saved && <p style={{ color: T.green, textAlign: "center", fontSize: 13, fontWeight: 700, marginBottom: 12, animation: "up 0.3s ease" }}>✓ Profile saved!</p>}
                <Btn outline onClick={() => setEditMode(true)} style={{ marginBottom: 10 }}>✏️ Edit Profile</Btn>
                <Btn outline onClick={async () => { await DB.signOut(); dispatch({ type: "RESET" }); nav("welcome"); }} style={{ color: T.coral, borderColor: T.coral + "40" }}>Sign Out</Btn>
              </>
            ) : (
              <div style={{ animation: "slideIn 0.3s ease" }}>
                <p style={{ color: T.muted, fontSize: 13, marginBottom: 20 }}>Update your profile information below.</p>
                {[
                  { key: "username", label: "Username", placeholder: "Your display name", icon: "👤" },
                  { key: "email", label: "Email Address", placeholder: "you@example.com", icon: "📧", type: "email" },
                  { key: "phone", label: "Phone Number", placeholder: "+1 (555) 000-0000", icon: "📱", type: "tel" },
                ].map(field => (
                  <div key={field.key} style={{ marginBottom: 16 }}>
                    <label style={{ color: T.muted, fontSize: 11, fontWeight: 700, letterSpacing: 0.5, textTransform: "uppercase", display: "flex", alignItems: "center", gap: 6, marginBottom: 8 }}>
                      <span>{field.icon}</span>{field.label}
                    </label>
                    <input
                      type={field.type || "text"}
                      value={form[field.key]}
                      onChange={e => setForm(f => ({ ...f, [field.key]: e.target.value }))}
                      placeholder={field.placeholder}
                      style={{ width: "100%", background: T.card, border: `1px solid ${T.border}`, borderRadius: 14, padding: "13px 16px", color: T.text, fontSize: 14 }}
                    />
                  </div>
                ))}
                <Btn onClick={saveProfile} style={{ marginBottom: 10 }}>💾 Save Changes</Btn>
                <Btn outline onClick={() => setEditMode(false)}>Cancel</Btn>
              </div>
            )}
          </div>
        )}

        {/* ── NOTIFICATIONS TAB ── */}
        {tab === "notifications" && (
          <div style={{ animation: "slideIn 0.3s ease" }}>
            <p style={{ color: T.muted, fontSize: 13, marginBottom: 20, lineHeight: 1.6 }}>Choose how and when you'd like to be reminded to show up for yourself.</p>

            {notifSettings.map((n, i) => {
              const isOn = userState.notifications[n.key];
              const missingField = n.requires && !userState[n.requires];
              return (
                <Card key={i} style={{ marginBottom: 10, opacity: missingField ? 0.5 : 1 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
                    <span style={{ fontSize: 22 }}>{n.icon}</span>
                    <div style={{ flex: 1 }}>
                      <div style={{ fontWeight: 700, fontSize: 14 }}>{n.label}</div>
                      <div style={{ color: T.muted, fontSize: 11, marginTop: 2 }}>{missingField ? `Add your ${n.requires} first` : n.desc}</div>
                    </div>
                    <Toggle on={isOn && !missingField} onChange={() => !missingField && toggleNotif(n.key)} color={T.pink} />
                  </div>
                </Card>
              );
            })}

            {(!userState.email || !userState.phone) && (
              <Card glow={T.gold} style={{ background: `${T.gold}08`, marginTop: 8 }}>
                <p style={{ color: T.gold, fontSize: 12, fontWeight: 700, marginBottom: 4 }}>💡 Add contact info</p>
                <p style={{ color: T.muted, fontSize: 12 }}>Go to the Profile tab to add your email or phone to unlock email and SMS reminders.</p>
              </Card>
            )}

            <p style={{ color: T.muted, fontSize: 11, textAlign: "center", marginTop: 16, lineHeight: 1.6 }}>
              Notification delivery requires integration with a backend service. These settings are saved to your profile for when the service is connected.
            </p>
          </div>
        )}

        {/* ── PLAN TAB ── */}
        {tab === "plan" && (
          <div style={{ animation: "slideIn 0.3s ease" }}>
            {/* Current plan */}

const Journal = ({ state, nav, userState }) => {
  const [entry, setEntry] = useState("");
  const [entries, setEntries] = useState([]);
  const [prompt, setPrompt] = useState("What's weighing on you most right now?");
  const [loading, setLoading] = useState(false);
  const isPro = userState.plan === PLANS.PRO;
  const freePrompts = ["What's weighing on you most right now?", "What would make today feel complete?", "What are you avoiding, and why?", "What do you need more of in your life?", "What small win can you celebrate today?"];
  const [freeIdx, setFreeIdx] = useState(0);

  const newPrompt = async () => {
    if (!isPro) { setFreeIdx(i => (i + 1) % freePrompts.length); setPrompt(freePrompts[(freeIdx + 1) % freePrompts.length]); return; }
    setLoading(true);
    try { setPrompt(await ai("Give one thoughtful journal prompt for mental wellness. Just the prompt itself, no intro.", 80)); }
    catch { setPrompt("What would make today feel complete?"); }
    setLoading(false);
  };

  const save = () => {
    if (!entry.trim()) return;
    setEntries(e => [{ text: entry, date: new Date().toLocaleDateString(), prompt }, ...e]);
    setEntry(""); newPrompt();
  };

  return (
    <Shell>
      <Bar />
      <div style={{ flex: 1, overflowY: "auto", padding: "16px 24px 100px" }}>
        <h2 style={{ fontFamily: "'Syne',sans-serif", fontWeight: 800, fontSize: 22, marginBottom: 18 }}>Journal ◈</h2>
        {!isPro && (
          <div style={{ background: `${T.purple}0A`, border: `1px solid ${T.purple}20`, borderRadius: 12, padding: "8px 14px", marginBottom: 14, display: "flex", alignItems: "center", justifyContent: "space-between" }}>
            <span style={{ color: T.muted, fontSize: 11 }}>5 rotating prompts on Free plan</span>
            <span style={{ color: T.purple, fontSize: 11, fontWeight: 700 }}>Prompt {freeIdx + 1}/5</span>
          </div>
        )}
        <Card glow={T.pink} style={{ marginBottom: 18, background: `${T.pink}08` }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 8 }}>
            <Tag label="Today's Prompt" color={T.pink} />
            <button onClick={newPrompt} style={{ background: "none", border: "none", color: T.pink, fontSize: 12, fontWeight: 600 }}>{loading ? "…" : "↺ New"}</button>
          </div>
          <p style={{ fontStyle: "italic", fontSize: 14, lineHeight: 1.65, color: T.text }}>"{prompt}"</p>
        </Card>
        <textarea value={entry} onChange={e => setEntry(e.target.value)} placeholder="Write freely…" style={{ width: "100%", minHeight: 160, background: T.card, border: `1px solid ${T.border}`, borderRadius: 16, padding: 16, color: T.text, fontSize: 14, resize: "none", lineHeight: 1.7, marginBottom: 14 }} />
        <Btn disabled={!entry.trim()} onClick={save} style={{ marginBottom: 24 }}>Save Entry</Btn>
        {entries.map((e, i) => (
          <Card key={i} style={{ marginBottom: 10, opacity: 0.85 }}>
            <p style={{ color: T.muted, fontSize: 11, marginBottom: 6 }}>{e.date}</p>
            <p style={{ fontSize: 13, lineHeight: 1.65 }}>{e.text.slice(0, 160)}{e.text.length > 160 ? "…" : ""}</p>
          </Card>
        ))}
      </div>
      <Nav screen="journal" nav={nav} />
    </Shell>
  );
};
